version: "2"
sql:
  - engine: "postgresql"
    # Only the up-migrations describe the live schema (down files would DROP it).
    schema: "migrations/*.up.sql"
    queries: "internal/db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          # tsvector has no meaningful Go representation; never selected directly.
          - db_type: "pg_catalog.tsvector"
            go_type: "string"
