services:
  postgres:
    image: postgres:16-alpine
    container_name: lore-postgres
    environment:
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lore
      POSTGRES_DB: lore
    ports:
      - "5432:5432"
    volumes:
      - lore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore -d lore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lore_pgdata:
